<div class="w-full max-w-md bg-[#0F172A]/90 backdrop-blur-md rounded-2xl p-6 border border-gray-800 shadow-xl text-white">
  
  <!-- Header Element: Title & Settings -->
  <div class="flex justify-between items-center mb-5">
    <div class="flex items-center gap-2">
      <!-- Swap Icon SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-purple-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m16 3 4 4-4 4"></path>
        <path d="M20 7H4"></path>
        <path d="m8 21-4-4 4-4"></path>
        <path d="M4 17h16"></path>
      </svg>
      <h2 class="text-xl font-bold tracking-wide">Swap</h2>
    </div>
    
    <!-- Settings Icon (Slippage Modal Option) -->
    <button class="text-gray-400 hover:text-white transition-colors duration-200">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
  </div>

  <!-- Input Wrapper: FROM TOKEN -->
  <div class="bg-[#1E293B]/60 border border-gray-800/80 rounded-xl p-4 mb-2 hover:border-gray-700 transition-all duration-200">
    <div class="flex justify-between text-xs text-gray-400 mb-1">
      <span>From</span>
      <span>Balance: 1.24 ETH</span>
    </div>
    <div class="flex items-center justify-between gap-3">
      <!-- Token Selector Dropdown Button -->
      <button class="flex items-center gap-2 bg-[#0F172A] hover:bg-[#1E293B] border border-gray-700/50 px-3 py-2 rounded-lg transition-all duration-150">
        <!-- USDC/ETH Custom Logo (Image representation) -->
        <div class="w-5 h-5 rounded-full bg-blue-500 flex items-center justify-center font-bold text-[10px] text-white">USDC</div>
        <span class="font-semibold text-sm">USDC</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      
      <!-- Input Field -->
      <input 
        type="number" 
        placeholder="0.00" 
        class="w-full bg-transparent text-right text-2xl font-semibold outline-none text-white placeholder-gray-600 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
      />
    </div>
  </div>

  <!-- Middle Intersecting Arrow Button (Invert Swap Order) -->
  <div class="flex justify-center -my-3 relative z-10">
    <button class="bg-[#1E293B] border border-gray-700 hover:border-purple-500 p-2 rounded-xl text-gray-400 hover:text-purple-400 shadow-md transition-all duration-200 transform hover:rotate-180">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M19 12l-7 7-7-7"/>
      </svg>
    </button>
  </div>

  <!-- Input Wrapper: TO TOKEN -->
  <div class="bg-[#1E293B]/60 border border-gray-800/80 rounded-xl p-4 mt-2 mb-4 hover:border-gray-700 transition-all duration-200">
    <div class="flex justify-between text-xs text-gray-400 mb-1">
      <span>To</span>
      <span>Balance: 0.00 EURC</span>
    </div>
    <div class="flex items-center justify-between gap-3">
      <!-- Token Selector Dropdown Button -->
      <button class="flex items-center gap-2 bg-[#0F172A] hover:bg-[#1E293B] border border-gray-700/50 px-3 py-2 rounded-lg transition-all duration-150">
        <div class="w-5 h-5 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-[10px] text-white">EURC</div>
        <span class="font-semibold text-sm">EURC</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      
      <!-- Input Field (ReadOnly or output simulation) -->
      <input 
        type="number" 
        placeholder="0.00" 
        readonly
        class="w-full bg-transparent text-right text-2xl font-semibold outline-none text-gray-400 cursor-not-allowed placeholder-gray-600"
      />
    </div>
  </div>

  <!-- Extra Info Field (Slippage Data) -->
  <div class="flex justify-between items-center px-1 mb-5 text-sm">
    <span class="text-gray-400">Slippage Tolerance</span>
    <span class="font-medium text-purple-400 bg-purple-500/10 px-2 py-0.5 rounded-md border border-purple-500/20">0.5%</span>
  </div>

  <!-- Main Swap Execution Action Button -->
  <button class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg shadow-indigo-600/20 active:scale-[0.99] transition-all duration-150 tracking-wide text-center">
    Swap
  </button>

  <!-- Powered By Brand Tag -->
  <p class="text-center text-[11px] text-gray-500 mt-4 tracking-wider uppercase font-medium">
    Powered by 1inch / Uniswap
  </p>

</div>
